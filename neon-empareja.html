<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Empareja | Une imagen y palabra · LIPA Brain Gym</title>
  <meta name="description" content="Empareja dibujos y palabras. Ideal para Infantil y vocabulario.">
  <link rel="stylesheet" href="/css/lipa-ui.css">
  <link rel="stylesheet" href="/css/site-nav.css">
  <link rel="stylesheet" href="/css/mini-games.css">
  <link rel="stylesheet" href="/css/brain-gym.css">
  <link rel="stylesheet" href="/css/brain-design-system.css?v=5">
  <link rel="stylesheet" href="/css/brain-profiles.css">
  <meta name="theme-color" content="#2ed3a6">
  <script src="/consent.js"></script>
</head>
<body class="lipa-page lipa-brain-soft game-page game-page--brain" data-empareja-mode="palabras" data-empareja-activity="neon-empareja">
  <nav class="site-nav"><a class="site-nav__brand" href="/">LIPA Studios</a></nav>
  <script src="/js/site-nav.js" defer></script>
  <main class="wrap">
    <p class="brain-eyebrow">LIPA Brain Gym · emparejar</p>
    <h1>Neon Empareja</h1>
    <p class="lead">Toca un dibujo y después su palabra.</p>
    <p id="empareja-brain-level" class="brain-level-pill">Nivel Brain 1</p>
    <div class="stats">
      <div class="stat"><span>Tiempo</span><strong id="empareja-timer">30 s</strong></div>
      <div class="stat"><span>Puntos</span><strong id="empareja-score">0</strong></div>
      <div class="stat"><span>Precisión</span><strong id="empareja-accuracy">100%</strong></div>
      <div class="stat"><span>Combo</span><strong id="empareja-combo">0</strong></div>
    </div>
    <div id="empareja-arena" class="math-arena peques-arena">
      <div class="math-arena__inner">
        <p id="empareja-prompt" class="peques-prompt">Pulsa empezar</p>
        <div id="empareja-work" class="peques-work"></div>
      </div>
    </div>
    <div id="empareja-overlay" class="game-overlay" hidden>
      <p><strong>¡Fin!</strong></p>
      <p>Puntos: <strong id="empareja-final-score">0</strong> · <strong id="empareja-final-acc">0%</strong></p>
    </div>
    <button type="button" class="btn btn--brain" id="empareja-start">Empezar</button>
  </main>
  <script src="/js/lipa-brain-profiles.js"></script>
  <script src="/js/lipa-daily.js"></script>
  <script src="/js/lipa-brain-catalog.js"></script>
  <script src="/js/lipa-mascot.js"></script>
  <script src="/js/lipa-brain-play.js"></script>
  <script src="/js/lipa-game-feedback.js"></script>
  <script src="/js/lipa-game-hint.js"></script>
  <script src="/js/lipa-curriculum-meta.js"></script>
  <script src="/js/lipa-lomloe-ref.js"></script>
  <script src="/js/lipa-curriculum-build.js"></script>
  <script src="/js/lipa-curriculum-data.js"></script>
  <script src="/js/lipa-curriculum.js"></script>
  <script src="/js/lipa-curriculum-session.js"></script>
  <script src="/js/lipa-brain-core.js"></script>
  <script src="/js/lipa-routine-flow.js"></script>
  <script src="/js/lipa-profile-switcher.js"></script>
  <script src="/js/lipa-analytics.js"></script>
  <script src="/js/neon-empareja.js"></script>
</body>
</html>
