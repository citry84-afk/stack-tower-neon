  <meta charset="UTF-8">

  <title>Neon Beat WOW | Juego de ritmo y reflejos gratis · LIPA Studios</title>
  <meta name="description" content="Neon Beat WOW: juego de ritmo gratis en el navegador. Toca al compás, suma combo y mejora reflejos musicales. Sin descarga.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://lipastudios.com/neon-beat.html">
  <link rel="stylesheet" href="/css/site-nav.css">

  <meta name="theme-color" content="#ff0080">
  <script src="/consent.js"></script>

  <script>
    window.dataLayer = window.dataLayer || [];

    gtag('js', new Date());

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Orbitron', system-ui, sans-serif;
      background: #050505;
      color: #e8f6ff;
      min-height: 100vh;
    }
    .wrap { max-width: 480px; margin: 0 auto; padding: 16px; }
    h1 { color: #FF0080; text-shadow: 0 0 12px #FF0080; font-size: 1.5rem; }
    .hud {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    .hud strong { color: #00ffff; }
    #beat-lanes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .lane {
      position: relative;
      height: 320px;
      background: rgba(0,0,0,0.5);
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    .lane.hit-zone {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: rgba(0,255,255,0.15);
      border-top: 2px solid #00ffff;
    }
    .note {
      position: absolute;
      left: 8%;
      width: 84%;
      height: 20px;
      border-radius: 4px;
      background: linear-gradient(90deg, #FF0080, #00ffff);
      box-shadow: 0 0 10px #FF0080;
    }
    .lane.active .hit-zone { background: rgba(57,255,20,0.35); border-color: #39FF14; }
    .lane.miss .hit-zone { background: rgba(255,69,0,0.3); }
    .controls { text-align: center; }
    .btn {
      background: #FF0080;
      color: #fff;
      border: none;
      padding: 14px 28px;
      font-family: inherit;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin: 4px;
    }
    .btn--ghost { background: transparent; border: 2px solid #00ffff; color: #00ffff; }
    #screen-over {
      text-align: center;
      padding: 24px;
      border: 2px solid #39FF14;
      border-radius: 12px;
      margin-top: 16px;
    }
    .links { margin-top: 20px; }
    .links a { color: #00ffee; display: block; margin: 8px 0; }
  </style>
</head>
<body>
  <nav class="site-nav" role="navigation" aria-label="Navegación principal">
    <div class="site-nav__inner">
      <div class="site-nav__top">
        <a class="site-nav__brand" href="/">🎮 LIPA Studios</a>
        <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="primary-nav">Menú</button>
      </div>
      <div id="primary-nav" class="nav-links">
        <a href="/">Inicio</a>
        <a href="/juegos-de-reflejos.html">Juegos</a>
        <a href="/test-reflejos.html">Test reflejos</a>
        <a href="/neon-runner.html">Neon Runner</a>
      </div>
    </div>
    <div class="nav-backdrop" id="nav-backdrop"></div>
  </nav>
  <script src="/js/site-nav.js" defer></script>

  <main class="wrap">
    <h1>🎵 Neon Beat WOW</h1>
    <p>Toca la columna cuando la nota llegue a la zona inferior. Mejora ritmo y reflejos.</p>
    <div class="hud">
      <span>Puntos: <strong id="score">0</strong></span>
      <span>Combo: <strong id="combo">0</strong></span>
    </div>
    <div id="beat-lanes" aria-label="Cuatro carriles de ritmo"></div>
    <div class="controls" id="screen-play">
      <button type="button" class="btn" id="btn-start">▶ Jugar</button>
    </div>
    <div id="screen-over" hidden>
      <p>Fin de partida</p>
      <p>Puntuación: <strong id="final-score">0</strong></p>
      <button type="button" class="btn" id="btn-retry">Otra vez</button>
      <button type="button" class="btn btn--ghost" id="btn-share">Compartir</button>
    </div>
    <nav class="links">
      <a href="/">← Stack Tower Neon</a>
      <a href="/neon-runner.html">Neon Runner →</a>
      <a href="/entrenador-reflejos.html">Rutina del entrenador</a>
    </nav>
  </main>

  <script src="/js/lipa-daily.js"></script>
  <script>
    (function () {
      var BPM = 120;
      var DURATION = 45;
      var lanes = [];
      var score = 0;
      var combo = 0;
      var running = false;
      var spawnTimer = null;
      var endTimer = null;
      var audioCtx = null;

      function initLanes() {
        var root = document.getElementById('beat-lanes');
        root.innerHTML = '';
        lanes = [];
        for (var i = 0; i < 4; i++) {
          var lane = document.createElement('div');
          lane.className = 'lane';
          lane.dataset.lane = i;
          lane.innerHTML = '<div class="hit-zone"></div>';
          lane.addEventListener('pointerdown', function () { hitLane(parseInt(this.dataset.lane, 10)); });
          root.appendChild(lane);
          lanes.push(lane);
        }
      }

      function beep(freq) {
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          var o = audioCtx.createOscillator();
          var g = audioCtx.createGain();
          o.frequency.value = freq;
          o.type = 'square';
          g.gain.value = 0.06;
          o.connect(g);
          g.connect(audioCtx.destination);
          o.start();
          o.stop(audioCtx.currentTime + 0.08);
        } catch (e) { /* ignore */ }
      }

      function spawnNote() {
        if (!running) return;
        var laneIdx = Math.floor(Math.random() * 4);
        var lane = lanes[laneIdx];
        var note = document.createElement('div');
        note.className = 'note';
        note.style.top = '-24px';
        note.dataset.lane = laneIdx;
        note.dataset.spawn = Date.now();
        lane.appendChild(note);
        var start = performance.now();
        var travel = 2800 - (score * 8);
        if (travel < 1400) travel = 1400;
        function tick(now) {
          if (!note.parentNode) return;
          var p = Math.min(1, (now - start) / travel);
          note.style.top = (p * 272) + 'px';
          if (p < 1) requestAnimationFrame(tick);
          else {
            combo = 0;
            updateHud();
            lane.classList.add('miss');
            setTimeout(function () { lane.classList.remove('miss'); }, 200);
            note.remove();
          }
        }
        requestAnimationFrame(tick);
      }

      function hitLane(idx) {
        if (!running) return;
        var lane = lanes[idx];
        var notes = lane.querySelectorAll('.note');
        if (!notes.length) {
          combo = 0;
          updateHud();
          return;
        }
        var note = notes[notes.length - 1];
        var top = parseFloat(note.style.top) || 0;
        if (top > 220 && top < 290) {
          combo++;
          var pts = 10 + combo * 2;
          score += pts;
          beep(440 + combo * 40);
          lane.classList.add('active');
          setTimeout(function () { lane.classList.remove('active'); }, 120);
          note.remove();
        } else {
          combo = 0;
          lane.classList.add('miss');
          setTimeout(function () { lane.classList.remove('miss'); }, 200);
        }
        updateHud();
      }

      function updateHud() {
        document.getElementById('score').textContent = score;
        document.getElementById('combo').textContent = combo;
      }

      function endGame() {
        running = false;
        clearInterval(spawnTimer);
        clearTimeout(endTimer);
        document.getElementById('screen-play').hidden = true;
        document.getElementById('screen-over').hidden = false;
        document.getElementById('final-score').textContent = score;
        var best = parseInt(localStorage.getItem('neonBeatBest') || '0', 10);
        if (score > best) localStorage.setItem('neonBeatBest', String(score));
        if (window.LipaDaily && LipaDaily.recordSession) {
          LipaDaily.recordSession('neon-beat', { score: score });
        }
        lanes.forEach(function (l) {
          l.querySelectorAll('.note').forEach(function (n) { n.remove(); });
        });
      }

      function startGame() {
        score = 0;
        combo = 0;
        running = true;
        updateHud();
        document.getElementById('screen-over').hidden = true;
        document.getElementById('screen-play').hidden = false;
        initLanes();
        var interval = (60 / BPM) * 500;
        spawnTimer = setInterval(spawnNote, interval);
        endTimer = setTimeout(endGame, DURATION * 1000);
      }

      document.getElementById('btn-start').addEventListener('click', startGame);
      document.getElementById('btn-retry').addEventListener('click', startGame);
      document.getElementById('btn-share').addEventListener('click', function () {
        LipaDaily.shareResult({
          text: '🎵 Conseguí ' + score + ' pts en Neon Beat WOW. ¿Me superas?',
          url: 'https://lipastudios.com/neon-beat.html'
        });
      });

      initLanes();
    })();
  </script>
</body>
